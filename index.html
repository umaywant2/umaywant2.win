<style>
/* ============================================================
   NAWDERIAN COSMIC TRIADIC THEME — MOBILE FIRST
   ============================================================ */

  :root {
  --bg-main: #0d0f12;
  --bg-nav: #15181d;
  --border-subtle: #2a2f38;
  --text-main: #dfe7f3;
  --text-muted: #9aa4b2;
  --accent-rtt: #8ab4ff;
  --radius: 10px;
  --shadow: 0 0 20px rgba(0,0,0,0.4);
  --gradient: linear-gradient(135deg, #1e2530, #0d0f12);
  --triadic: linear-gradient(135deg, #8ab4ff, #c792ea, #f6c177);
  --rtt-accent-low:  #7aa2f7;   /* cool / entry */
  --rtt-accent-mid:  #9ece6a;   /* balance */
  --rtt-accent-high: #f7768e;   /* emphasis */
}

.protocol a,
.equation a {
  border-bottom-style: dotted;
}

/* Base link style */
a {
  color: var(--rtt-accent-mid);
  text-decoration: none;
  border-bottom: 1px solid rgba(255, 255, 255, 0.25);
  transition: color 0.2s ease, border-color 0.2s ease;
}

/* Hover / focus */
a:hover,
a:focus {
  color: var(--rtt-accent-high);
  border-bottom-color: var(--rtt-accent-high);
}

/* Visited links */
a:visited {
  color: var(--rtt-accent-low);
}

  /* Base layout */
  html { scroll-behavior: smooth; }
  body {
  margin: 0;
  padding: 0;
  background: var(--bg-main);
  color: var(--text-main);
  font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  line-height: 1.65;
  font-size: 17px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  }

  /* Headings */
  h1, h2, h3, h4 {
  font-weight: 700;
  margin-top: 1.8em;
  margin-bottom: 0.5em;
  line-height: 1.2;
  background: var(--triadic);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  }

  /* Paragraphs and lists */
  p, ul, ol {
  padding: 0 1em;
  margin: 0 0 1.1em 0;
  color: #dfe7f3;
  }

  /* Code/pre */
  pre, code {
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, "Roboto Mono", "Courier New", monospace;
  background: rgba(255,255,255,0.02);
  padding: 0.4em 0.6em;
  border-radius: 6px;
  color: #cfe8ff;
  }

nav {
  width: 260px;
  float: left;
  background: var(--bg-nav);
  margin-left: 0;
  padding: 1.2rem;
  overflow-y: auto;
  border-right: 1px solid var(--border-subtle);
}

nav h2 {

  margin-top: 1.2rem;

}

nav a {
  display: block;
  color: var(--text-muted);

}

nav a:hover {

}

main {
  flex: 1;

  overflow-y: auto;
}

main h1, main h2, main h3 {
  color: var(--accent-rtt);
  font-weight: 500;
}

pre {
  background: #0b0d12;
  padding: 1rem;
  overflow-x: auto;
  border-left: 2px solid var(--accent-rtt);
}

code {

}

<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<body>
   
<nav class="nav-band">

    <h3>📌 Flyer Announcement</h3>

    <h3>🚸 Rules</h3>
      <a href="#RULES">🛣️ Rules</a>
      <a href="#RULES_GLANCE">🧑‍🏭 Rules at a Glance</a>
    <h3>📊 Scoring and Sign-up</h3>
      <a href="#SCORING">⚖️ Scoring and review process</a>
      <a href="#SIGNUP">🌐 Sign‑Up Page Language</a>
  
</nav>

<main id="content"></main>

<script>

const DOC_MAP = {
  README: 'README.md',
  FLYER: 'Flyer_Layout_Copy.md',
  REDDIT: 'Reddit_Announcement.md',  
  RULES: 'Rules.md',
  RULES_GLANCE: 'Rules_at_a_Glance.md',
  SCORING: 'Scoring_and_review_process.md',
  SIGNUP: 'Sign‑Up_Page_Language.md',
};
  
function loadFromHash() {
  const key = window.location.hash.replace('#', '');
  if (DOC_MAP[key]) {
    loadDoc(DOC_MAP[key]);
  } else {
    loadDoc('README.md');
  }
}
function loadDoc(file) {
  fetch(file)
    .then(response => {
      if (!response.ok) {
        throw new Error(`Failed to load ${file}`);
      }
      return response.text();
    })
    .then(text => {
      const content = document.getElementById('content');
      content.innerHTML = marked.parse(text);

      if (window.MathJax) {
        MathJax.typesetPromise([content]);
      }
    })
    .catch(err => {
      document.getElementById('content').innerHTML =
        `<p style="color:#ff8080;">Unable to load document: ${file}</p>`;
      console.error(err);
    });
}
  
window.addEventListener('hashchange', loadFromHash);
loadFromHash();

</script>

</body>
